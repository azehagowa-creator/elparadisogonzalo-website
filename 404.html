<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Elparadisogonzalo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f9f9f9;
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .error-container {
      text-align: center;
      padding: 40px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }

    .error-container h1 {
      font-size: 6em;
      color: #4CAF50;
      margin-bottom: 10px;
    }

    .error-container h2 {
      font-size: 2em;
      margin-bottom: 15px;
      color: #333;
    }

    .error-container p {
      font-size: 1.1em;
      margin-bottom: 25px;
      color: #666;
    }

    .error-container a {
      display: inline-block;
      padding: 12px 25px;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .error-container a:hover {
      background: #388E3C;
    }

    @media (max-width: 480px) {
      .error-container h1 { font-size: 4em; }
      .error-container h2 { font-size: 1.5em; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The page you are looking for does not exist.</p>
    <a href="index.html">Go Back Home</a>
  </div>
</body>
</html>
